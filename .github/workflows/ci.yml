name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint lib/
        run: shellcheck -x lib/*.sh
      - name: Lint templates/
        run: shellcheck -x templates/*.sh
      - name: Lint install.sh
        run: shellcheck -x install.sh
      - name: Lint tools/
        run: shellcheck -x tools/*.sh

  test:
    name: E2E Tests
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core gum stow fzf gettext jq sd
      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y stow gettext-base jq fzf
          cargo install sd || true
          npm install -g bats
      - name: Run E2E tests
        run: bats tests/e2e/
