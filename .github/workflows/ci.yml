name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint lib/
        run: shellcheck lib/*.sh
      - name: Lint templates/
        run: shellcheck templates/*.sh
      - name: Lint install.sh
        run: shellcheck install.sh

  test:
    name: E2E Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install bats-core gum stow fzf gettext
      - name: Run E2E tests
        run: bats tests/e2e/
